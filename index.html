<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Shopping Site</title>
    <style>
        /* Estilos Globais do Wireframe */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Menu de Navegação Interativo */
        nav {
            width: 100%;
            max-width: 450px;
            background-color: #333;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav button {
            background: none;
            border: none;
            color: #ccc;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.2s;
        }

        nav button.active {
            color: #fff;
            border-bottom: 2px solid #fff;
        }

        /* Container do App (Simulando uma tela de celular/tablet) */
        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: calc(100vh - 43px);
            background-color: #ffffff;
            border: 2px solid #ccc;
            padding: 20px;
            padding-bottom: 40px;
        }

        /* Controle de exibição das páginas */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Componentes Padrão do seu Design */
        .wireframe-box-x {
            width: 100%;
            height: 220px;
            background-color: #d9d9d9;
            border: 2px solid #000;
            margin-bottom: 20px;
            /* Desenha o X característico do seu wireframe */
            background-image: 
                linear-gradient(to top right, transparent 49.5%, #000 49.5%, #000 50.5%, transparent 50.5%),
                linear-gradient(to bottom right, transparent 49.5%, #000 49.5%, #000 50.5%, transparent 50.5%);
        }

        .search-container {
            width: 100%;
            background-color: #d9d9d9;
            border: 2px solid #000;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* Customizações da Página de Pesquisa (Grid de Resultados) */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .grid-item {
            height: 120px;
            background-color: #e5e5e5;
            border: 1px dashed #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }

        /* Customizações da Página de Produto */
        .circles-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .wireframe-circle {
            width: 65px;
            height: 65px;
            background-color: #d9d9d9;
            border-radius: 50%;
            border: 2px solid #000;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .product-info-block {
            width: 100%;
            background-color: #d9d9d9;
            border: 2px solid #000;
            padding: 30px 15px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .action-button {
            width: 100%;
            background-color: #d9d9d9;
            border: 2px solid #000;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .action-button:hover {
            background-color: #c5c5c5;
        }

        /* Customizações da Página de Perfil */
        .profile-avatar-x {
            width: 160px;
            height: 160px;
            background-color: #d9d9d9;
            border-radius: 50%;
            border: 2px solid #000;
            margin: 10px auto 20px auto;
            /* Desenha o X dentro do círculo */
            background-image: 
                linear-gradient(to top right, transparent 49.5%, #000 49.5%, #000 50.5%, transparent 50.5%),
                linear-gradient(to bottom right, transparent 49.5%, #000 49.5%, #000 50.5%, transparent 50.5%);
        }

        .profile-name-tag {
            width: 100%;
            background-color: #d9d9d9;
            border: 2px solid #000;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .profile-menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .profile-menu-item {
            width: 100%;
            background-color: #d9d9d9;
            border: 2px solid #000;
            padding: 15px;
            text-align: left;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <button onclick="switchPage('inicial')" id="btn-inicial" class="active">Inicial</button>
        <button onclick="switchPage('pesquisa')" id="btn-pesquisa">Pesquisa</button>
        <button onclick="switchPage('produto')" id="btn-produto">Produto</button>
        <button onclick="switchPage('perfil')" id="btn-perfil">Perfil</button>
    </nav>

    <div class="app-container">

        <div id="page-inicial" class="page active">
            <div class="wireframe-box-x"></div>
            <div class="search-container" onclick="switchPage('pesquisa')">Pesquise</div>
        </div>

        <div id="page-pesquisa" class="page">
            <div class="search-container">Pesquise</div>
            <div class="results-grid">
                <div class="grid-item">Item Result 1</div>
                <div class="grid-item">Item Result 2</div>
                <div class="grid-item">Item Result 3</div>
                <div class="grid-item">Item Result 4</div>
            </div>
        </div>

        <div id="page-produto" class="page">
            <div class="circles-row">
                <div class="wireframe-circle"></div>
                <div class="wireframe-circle"></div>
                <div class="wireframe-circle"></div>
                <div class="wireframe-circle"></div>
                <div class="wireframe-circle"></div>
            </div>
            <div class="search-container" onclick="switchPage('pesquisa')">Pesquise</div>
            <div class="product-info-block">Preco e informacoes do produto</div>
            <div class="action-button" onclick="alert('Compra realizada!')">Comprar Agora</div>
            <div class="action-button" onclick="alert('Adicionado ao carrinho!')">Adicionar ao carrinho</div>
        </div>

        <div id="page-perfil" class="page">
            <div class="profile-avatar-x"></div>
            <div class="search-container" onclick="switchPage('pesquisa')">Pesquise</div>
            <div class="profile-name-tag">Nome</div>
            <div class="profile-menu-list">
                <div class="profile-menu-item">Pedidos em andamento</div>
                <div class="profile-menu-item">Produtos salvos(Favoritos)</div>
                <div class="profile-menu-item">Endereço</div>
                <div class="profile-menu-item">Formas de Pagamento</div>
            </div>
        </div>

    </div>

    <script>
        function switchPage(pageId) {
            // Remove a classe active de todas as páginas
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            // Remove a classe active de todos os botões do menu
            document.querySelectorAll('nav button').forEach(button => {
                button.classList.remove('active');
            });

            // Ativa a página e o botão correspondentes
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('active');
            
            // Rola a página de volta para o topo ao alternar
            window.scrollTo(0, 0);
        }
    </script>

</body>
</html>
