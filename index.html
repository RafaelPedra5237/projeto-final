<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Wireframe App</title>
    <style>
        :root {
            --bg-color: #f4f4f6;
            --wireframe-gray: #e0e0e0;
            --wireframe-dark: #b5b5b5;
            --text-color: #333;
            --primary-color: #2563eb;
            --accent-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container simulando a tela de um smartphone/web app */
        .app-container {
            width: 100%;
            max-width: 412px;
            height: 844px;
            background: #ffffff;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            border: 8px solid #222;
        }

        /* Componente de Pesquisa Global (Presente em várias páginas) */
        .search-header {
            padding: 16px;
            background: #fff;
            border-bottom: 1px solid var(--wireframe-gray);
        }

        .search-bar {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--wireframe-dark);
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary-color);
            background-color: #fff;
        }

        /* Área de conteúdo dinâmico */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px; /* Espaço para a navegação */
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .page.active {
            display: block;
        }

        /* Estilização dos "X" de placeholders do Wireframe */
        .wireframe-box-x {
            width: 100%;
            height: 200px;
            background-color: var(--wireframe-gray);
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .wireframe-box-x::before, .wireframe-box-x::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 145%;
            height: 2px;
            background-color: var(--wireframe-dark);
        }

        .wireframe-box-x::before { transform: translate(-50%, -50%) rotate(27deg); }
        .wireframe-box-x::after { transform: translate(-50%, -50%) rotate(-27deg); }

        /* --- TELA INICIAL (PAGE 1) --- */
        .home-alert {
            background-color: #ef4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .product-grid-preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .grid-item-placeholder {
            height: 120px;
            background-color: var(--wireframe-gray);
            border-radius: 8px;
        }

        /* --- TELA DE PESQUISA (PAGE 2) --- */
        .search-results {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--bg-color);
            border-radius: 8px;
        }

        .result-img-placeholder {
            width: 60px;
            height: 60px;
            background: var(--wireframe-dark);
            border-radius: 6px;
        }

        .result-text-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        .line-placeholder {
            height: 12px;
            background: var(--wireframe-gray);
            border-radius: 4px;
        }

        /* --- TELA DO PRODUTO (PAGE 3) --- */
        .circles-container {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 0 8px;
        }

        .wireframe-circle {
            width: 55px;
            height: 55px;
            background-color: var(--wireframe-gray);
            border-radius: 50%;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .wireframe-circle:hover {
            transform: scale(1.1);
            background-color: var(--wireframe-dark);
        }

        .product-info-box {
            background: var(--bg-color);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .product-info-box h2 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .product-info-box p {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.8; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: var(--accent-color); color: white; }

        /* --- TELA DE PERFIL (PAGE 4) --- */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .profile-avatar-x {
            width: 120px;
            height: 120px;
            background-color: var(--wireframe-gray);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
            border: 2px solid var(--wireframe-dark);
        }

        .profile-avatar-x::before, .profile-avatar-x::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150%;
            height: 2px;
            background-color: var(--wireframe-dark);
        }
        .profile-avatar-x::before { transform: translate(-50%, -50%) rotate(45deg); }
        .profile-avatar-x::after { transform: translate(-50%, -50%) rotate(-45deg); }

        .profile-name {
            font-size: 20px;
            font-weight: bold;
        }

        .profile-menu {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background-color: var(--wireframe-gray);
            border-radius: 12px;
            overflow: hidden;
        }

        .menu-item {
            background-color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: background 0.2s;
            cursor: pointer;
        }

        .menu-item:hover {
            background-color: var(--bg-color);
        }

        .menu-item::after {
            content: '→';
            color: var(--wireframe-dark);
        }

        /* Navegação Inferior Fixa */
        .nav-tabs {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 68px;
            background: white;
            border-top: 1px solid var(--wireframe-gray);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 11px;
            color: var(--wireframe-dark);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .nav-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .nav-btn.active {
            color: var(--primary-color);
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="search-header">
            <input type="text" class="search-bar" placeholder="Pesquise produtos, marcas e mais...">
        </div>

        <div class="content-area">

            <section id="inicial" class="page active">
                <div class="home-alert">!! Destaques da Semana</div>
                <div class="wireframe-box-x"></div>
                <div class="product-grid-preview">
                    <div class="grid-item-placeholder"></div>
                    <div class="grid-item-placeholder"></div>
                </div>
            </section>

            <section id="pesquisa" class="page">
                <div class="search-results">
                    <div class="result-item">
                        <div class="result-img-placeholder"></div>
                        <div class="result-text-placeholder">
                            <div class="line-placeholder" style="width: 80%;"></div>
                            <div class="line-placeholder" style="width: 50%;"></div>
                        </div>
                    </div>
                    <div class="result-item">
                        <div class="result-img-placeholder"></div>
                        <div class="result-text-placeholder">
                            <div class="line-placeholder" style="width: 70%;"></div>
                            <div class="line-placeholder" style="width: 40%;"></div>
                        </div>
                    </div>
                    <div class="result-item">
                        <div class="result-img-placeholder"></div>
                        <div class="result-text-placeholder">
                            <div class="line-placeholder" style="width: 85%;"></div>
                            <div class="line-placeholder" style="width: 60%;"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="produto" class="page">
                <div class="circles-container">
                    <div class="wireframe-circle"></div>
                    <div class="wireframe-circle"></div>
                    <div class="wireframe-circle"></div>
                    <div class="wireframe-circle"></div>
                    <div class="wireframe-circle"></div>
                </div>

                <div class="product-info-box">
                    <h2>Preço e informações do produto</h2>
                    <p>Aqui ficam os detalhes técnicos do produto selecionado, opções de tamanho, cor e as avaliações de outros compradores.</p>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="alert('Indo para o checkout!')">Comprar Agora</button>
                    <button class="btn btn-secondary" onclick="alert('Adicionado ao carrinho!')">Adicionar ao carrinho</button>
                </div>
            </section>

            <section id="perfil" class="page">
                <div class="profile-header">
                    <div class="profile-avatar-x"></div>
                    <div class="profile-name">Nome do Usuário</div>
                </div>

                <div class="profile-menu">
                    <div class="menu-item" onclick="alert('Abrindo Pedidos')">Pedidos em andamento</div>
                    <div class="menu-item" onclick="alert('Abrindo Favoritos')">Produtos salvos (Favoritos)</div>
                    <div class="menu-item" onclick="alert('Abrindo Endereços')">Endereço</div>
                    <div class="menu-item" onclick="alert('Abrindo Pagamentos')">Formas de Pagamento</div>
                </div>
            </section>

        </div>

        <nav class="nav-tabs">
            <button class="nav-btn active" onclick="switchPage('inicial', this)">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Inicial
            </button>
            <button class="nav-btn" onclick="switchPage('pesquisa', this)">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                Pesquisa
            </button>
            <button class="nav-btn" onclick="switchPage('produto', this)">
                <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1 .9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                Produto
            </button>
            <button class="nav-btn" onclick="switchPage('perfil', this)">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                Perfil
            </button>
        </nav>

    </div>

    <script>
        function switchPage(pageId, button) {
            // Esconde todas as páginas
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));

            // Remove classe ativa de todos os botões da nav
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Mostra a página selecionada e ativa o botão
            document.getElementById(pageId).classList.add('active');
            button.classList.add('active');
            
            // Rola o conteúdo de volta para o topo ao mudar de página
            document.querySelector('.content-area').scrollTop = 0;
        }
    </script>
</body>
</html>
